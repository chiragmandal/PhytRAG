name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.4.0
      - run: ruff check .
      - run: ruff format --check .

  # ── Unit tests ───────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install CPU torch (avoid 2.5 GB CUDA download in CI)
        run: pip install torch==2.3.0 --index-url https://download.pytorch.org/whl/cpu
      - name: Install project dev dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Docker build ─────────────────────────────────────────────────────────────
  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push on PR)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ghcr.io/chiragmandal/phytrag:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Push to GHCR on main merge ────────────────────────────────────────────
  publish:
    name: Push to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/chiragmandal/phytrag:latest
            ghcr.io/chiragmandal/phytrag:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
