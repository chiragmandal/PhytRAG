# PhytRAG - Production RAG service over plant biology literature
# Ollama runs NATIVELY on macOS (not in Docker) for Metal acceleration.
# The api service reaches it via host.docker.internal:11434.
#
# Start order:
#   1. ollama serve        (terminal 1, native)
#   2. make up             (this file)
#   3. make ingest         (one-shot, after qdrant is healthy)

services:

  # ── FastAPI application ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phytrag-api
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      MLFLOW_TRACKING_URI: http://mlflow:5000
      COLLECTION_NAME: phytrag
      LLM_MODEL: llama3.2:3b
      EMBED_MODEL: all-MiniLM-L6-v2
      LOG_LEVEL: INFO
    depends_on:
      - qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Vector database ──────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: phytrag-qdrant
    ports:
      - "6333:6333"   # REST + gRPC
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # ── Experiment tracking ──────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: phytrag-mlflow
    command: >
      bash -c "pip install mlflow==2.13.2 --quiet --no-cache-dir &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri /mlflow/mlruns
               --default-artifact-root /mlflow/artifacts"
    ports:
      - "5002:5000"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

  # ── Metrics collection ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: phytrag-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped

  # ── Streamlit UI ─────────────────────────────────────────────────────────────
  ui:
    image: python:3.11-slim
    container_name: phytrag-ui
    working_dir: /app
    command: >
      bash -c "pip install streamlit==1.35.0 requests==2.32.2 --quiet --no-cache-dir &&
               streamlit run ui/streamlit_app.py
               --server.port 8501
               --server.address 0.0.0.0
               --server.headless true
               --browser.gatherUsageStats false"
    ports:
      - "8501:8501"
    environment:
      PHYTRAG_API_URL: http://api:8000
    volumes:
      - ./ui:/app/ui:ro
    depends_on:
      - api
    restart: unless-stopped

  # ── Dashboards ───────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: phytrag-grafana
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  qdrant_storage:
  mlflow_data:
  prometheus_data:
  grafana_data:
